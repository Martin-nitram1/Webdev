<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Welcome to my Media Gallery</h1>
        <p>Explore a collection of images and videos showcasing my work and interests.</p>
        <div class="gallery">
            <figure>
                <img src="image1.jpg" alt="Image 1">
                <figcaption>Image 1 Description</figcaption>
            </figure>
            <figure>    
                <img src="image2.jpg" alt="Image 2">
                <figcaption>Image 2 Description</figcaption>
            </figure>
            <figure>
                <img src="image3.jpg" alt="Image 3">
                <figcaption>Image 3 Description</figcaption>
            </figure>
            <figure>
                <video controls>
                    <source src="video1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Video 1 Description</figcaption>
            </figure>
            <figure>
                <video controls>
                    <source src="video2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Video 2 Description</figcaption>
            </figure>
            <figure>
                <video controls>
                    <source src="video3.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Video 3 Description</figcaption>
            </figure>
        </div>
    </main>  
</body>
<footer>

</footer>
</html>
