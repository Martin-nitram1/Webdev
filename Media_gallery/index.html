<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Welcome to my Media Gallery</h1>
        <p>Explore a collection of images and videos showcasing my work and interests.</p>
        <div class="gallery">
            <div class="images">
                <h2>Image Gallery</h2>
                <figure>
                    <img src= "https://images.pexels.com/photos/2002719/pexels-photo-2002719.jpeg" alt="Image 1">
                    <figcaption>abstract painting</figcaption>
                </figure>
                <figure>    
                    <img src= "https://images.pexels.com/photos/1266808/pexels-photo-1266808.jpeg" alt="Image 2">
                    <figcaption> beautiful painting</figcaption>
                </figure>
                <figure>
                    <img src= "https://images.pexels.com/photos/271682/pexels-photo-271682.jpeg" alt="Image 3">
                    <figcaption>beautiful modern art</figcaption>
                </figure>
            </div>
            <div class="divider"></div>
            <div class="videos">
                <h2>Video Gallery</h2>
                <figure>
                    <video controls>
                        <source src="https://www.pexels.com/download/video/3188991/" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <figcaption>Expression Video</figcaption>
                </figure>
                <figure>
                    <video controls>
                        <source src="https://www.pexels.com/download/video/7197673/" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <figcaption>Modern Expression</figcaption>
                </figure>
                <figure>
                    <video controls>
                        <source src="https://www.pexels.com/download/video/855433/" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <figcaption>ultimate view</figcaption>
                </figure>
            </div>
        </div>
    </main>  
</body>
